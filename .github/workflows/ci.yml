# ─────────────────────────────────────────────────────────────────────────────
# CI — runs on every PR to `dev` or `main`, and on pushes to `dev`.
#
# BLOCK MERGES WHEN TESTS FAIL (one-time GitHub setup):
#   1. Repo → Settings → Branches → Add branch protection rule
#   2. Branch name pattern: dev
#   3. ✓ Require a pull request before merging
#   4. ✓ Require status checks to pass before merging
#   5. Search and select: "CI / All Tests Passed"
#   6. Save changes
#
# Repeat for `main` if you want the same gate when merging dev → main.
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [dev, main]
  push:
    branches: [dev]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run all pytest tests
        run: pytest -v --tb=short
        env:
          JWT_SECRET: ci-test-secret-do-not-use-in-prod
          OPENAI_API_KEY: sk-ci-placeholder
          # Google OAuth intentionally unset — email/password must work in CI

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest (all test files)
        run: npm test

      - name: Typecheck and production build
        run: npm run build
        # No VITE_GOOGLE_CLIENT_ID — verifies email-only auth path builds cleanly

  # Gate job — branch protection should require THIS check name
  ci-success:
    name: All Tests Passed
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: always()
    steps:
      - name: Verify all jobs succeeded
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ] || \
             [ "${{ needs.frontend-tests.result }}" != "success" ]; then
            echo "::error::CI failed. Fix failing tests locally, push again, then merge."
            echo ""
            echo "  Backend:  cd backend && pip install -r requirements.txt -r requirements-dev.txt && pytest -v"
            echo "  Frontend: cd frontend && npm ci && npm test && npm run build"
            exit 1
          fi
          echo "All backend and frontend tests passed."
